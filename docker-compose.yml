version: "3.9"

services:
  brain-runtime:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    environment:
      REPO_ROOT: /app
      ROUTER_BACKEND: ${ROUTER_BACKEND:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INTERNET_ENABLED: ${INTERNET_ENABLED:-true}
      ASSISTANT_MODE: ${ASSISTANT_MODE:-local}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai_compatible}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://host.docker.internal:1234}  
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      MODEL_API_KEY: ${MODEL_API_KEY:-dummy}
      VOICE_TTS_ENABLED: ${VOICE_TTS_ENABLED:-true}
      ACTION_AUDIT_PATH: /app/logs/assistant-actions.jsonl
      RUNTIME_DAEMON_HOST: 0.0.0.0
      RUNTIME_DAEMON_PORT: 55881
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tmp:/app/tmp
    ports:
      - "55881:55881"  
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\",55881)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  interface:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    depends_on:
      brain-runtime:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8080
      WB_GATEWAY_MODE: daemon
      WB_AUTO_OPEN_BROWSER: "false"
      RUNTIME_DAEMON_HOST: brain-runtime
      RUNTIME_DAEMON_PORT: 55881
    ports:
      - "${INTERFACE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped