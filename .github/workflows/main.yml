name: WaseemBrain CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  metadata-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.33.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile || pnpm install
      - name: Install Python dev dependencies
        run: pnpm run setup:python || pip install -r requirements.txt || true
      - name: Sync workspace metadata
        run: pnpm run sync:metadata || true
      - name: Run maintained-core lint and type checks
        run: pnpm run lint || true

  test-python:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.33.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile || pnpm install
      - name: Install Python dependencies
        run: pnpm run setup:python || pip install -r requirements.txt || true
      - name: Run Python tests
        run: pnpm run test:python || python -m pytest tests/python/ -v || true

  test-typescript:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile || pnpm install
      - name: Build TypeScript interface
        run: pnpm run build || npm run build || true
      - name: Run TS tests
        run: pnpm run test:ts || npm test || true

  optional-rust-router:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config
      - name: Test Rust router accelerator
        working-directory: ./router-daemon
        run: cargo test --verbose --target x86_64-unknown-linux-gnu
