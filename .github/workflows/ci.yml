name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-runtime.txt -r requirements-training.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check brain tests/python scripts

      - name: Mypy
        run: python -m mypy brain

      - name: Pytest
        run: python -m pytest tests/python -q

      - name: Placeholder guard
        run: python scripts/guard_no_placeholders.py

      - name: Compile Python sources
        run: python -m compileall brain tests/python scripts

  skills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync repo skills
        run: python scripts/sync_codex_skills.py --output-root tmp/skills

      - name: Validate generated skills
        run: python scripts/validate_codex_skills.py tmp/skills

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript interface
        run: npm run build

      - name: Run TypeScript tests
        run: npm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust 1.94.1
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Run Rust tests
        run: cargo test --workspace --verbose
